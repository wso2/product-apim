        - lang: Curl
          source: 'curl -k -H "Authorization: Bearer ae4eae22-3f65-387b-a171-d37eaa366fa8"
          "https://127.0.0.1:9443/api/am/admin/v4/gateways"'
    post:
      operationId: createPlatformGateway
      tags:
        - Platform Gateways
      summary: Register a platform gateway
      description: |
        Register a new platform gateway. A registration token is generated and returned
        once in the response; store it (e.g. as GATEWAY_CONTROL_PLANE_TOKEN in Docker Compose) for the
        gateway to connect to the control plane WebSocket. The token is stored hashed and cannot be retrieved later.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlatformGatewayRequest'
      responses:
        201:
          description: |
            Created.
            Gateway and registration token (returned once) in the response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayResponseWithToken'
        400:
          $ref: '#/components/responses/BadRequest'
        404:
          $ref: '#/components/responses/NotFound'
        409:
          $ref: '#/components/responses/Conflict'
      security:
        - OAuth2Security:
            - apim:admin
      x-code-samples:
        - lang: Curl
          source: 'curl -k -X POST -H "Authorization: Bearer ae4eae22-3f65-387b-a171-d37eaa366fa8"
          -H "Content-Type: application/json" -d @data.json "https://127.0.0.1:9443/api/am/admin/v4/gateways"'

  /gateways/{gatewayId}/regenerate-token:
    post:
      operationId: regeneratePlatformGatewayToken
      tags:
        - Platform Gateways
      summary: Regenerate registration token for a platform gateway
      description: |
        Regenerate the registration token for an existing platform gateway. The old token is revoked
        and a new one is generated. Store the new token (e.g. as GATEWAY_CONTROL_PLANE_TOKEN in Docker Compose)
        for the gateway to reconnect to the control plane WebSocket. The token is returned only once.
      parameters:
        - name: gatewayId
          in: path
          description: Gateway UUID
          required: true
          schema:
            type: string
      responses:
        200:
          description: |
            OK.
            Gateway and new registration token (returned once) in the response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayResponseWithToken'
        400:
          $ref: '#/components/responses/BadRequest'
        404:
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2Security:
            - apim:admin
      x-code-samples:
        - lang: Curl
          source: 'curl -k -X POST -H "Authorization: Bearer ae4eae22-3f65-387b-a171-d37eaa366fa8"
          "https://127.0.0.1:9443/api/am/admin/v4/gateways/{gatewayId}/regenerate-token"'

  /gateways/{gatewayId}:
    put:
      operationId: updatePlatformGateway
      tags:
        - Platform Gateways
      summary: Update a platform gateway
      description: |
        Update platform gateway metadata. Request body must include all updatable fields (displayName,
        description, properties, permissions). Name and vhost cannot be changed. UI should send
        the full resource representation to align with PUT semantics.
      parameters:
        - name: gatewayId
          in: path
          description: Gateway UUID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlatformGatewayRequest'
      responses:
        200:
          description: OK. Updated platform gateway in the response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformGatewayResponse'
        400:
          $ref: '#/components/responses/BadRequest'
        404:
          $ref: '#/components/responses/NotFound'
      security:
        - OAuth2Security:
            - apim:admin
    delete:
      operationId: deletePlatformGateway
      tags:
        - Platform Gateways
      summary: Delete a platform gateway
      description: |
        Delete a platform gateway and all its references (tokens, instance mappings, revision deployment
        records, gateway environment, permissions). Fails with 409 if any API revisions are currently
        deployed to this gateway; undeploy all APIs from the gateway first.
      parameters:
        - name: gatewayId
          in: path
          description: Gateway UUID
          required: true
          schema:
            type: string
      responses:
        200:
          description: OK. Gateway and all references removed.
        404:
          $ref: '#/components/responses/NotFound'
        409:
          description: Conflict. Cannot delete gateway while API revisions are deployed to it.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - OAuth2Security:
            - apim:admin

