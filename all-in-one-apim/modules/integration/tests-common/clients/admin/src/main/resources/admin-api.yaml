        additionalProperties:
          type: array
          items:
            $ref: '#/components/schemas/AdditionalProperty'
        permissions:
          type: object
          properties:
            permissionType:
              type: string
              example: ALLOW
              default: PUBLIC
              enum:
                - PUBLIC
                - ALLOW
                - DENY
            roles:
              type: array
              items:
                type: string
                example: Internal/everyone
        status:
          type: string
