    Environment:
      title: Environment
      required:
        - name
        - vhosts
      type: object
      properties:
        id:
          type: string
          readOnly: true
          example: ece92bdc-e1e6-325c-b6f4-656208a041e9
        name:
          maxLength: 255
          minLength: 1
          pattern: '^[a-zA-Z0-9_-]+$'
          type: string
          example: us-region
        displayName:
          maxLength: 255
          minLength: 1
          type: string
          example: US Region
        provider:
          type: string
          example: wso2
        type:
          type: string
          default: hybrid
          example: hybrid
        gatewayType:
          type: string
          example: Regular
          default: Regular
        description:
          maxLength: 1023
          type: string
          example: Gateway environment in US Region
        isReadOnly:
          type: boolean
          example: false
          default: false
          deprecated: true
        mode:
          type: string
          enum:
            - READ_ONLY
            - READ_WRITE
            - WRITE_ONLY
          example: READ_WRITE
          default: WRITE_ONLY
          description: |
            The mode of the environment. This indicates whether the environment is in read-only or read-write mode.
            **READ_ONLY:** The environment is in read-only mode. API cannot be deployed, only discovery is possible.
            **READ_WRITE:** The environment is in read-write mode. APIs can be deployed and discovered.
            **WRITE_ONLY:** The environment is in write-only mode/ APIs only can be deployed.
        apiDiscoveryScheduledWindow:
          type: integer
          description: |
            The time window in minutes to schedule the API discovery task.
            This is used to discover APIs from the API Gateway and update the API list in the environment.
          default: 60
