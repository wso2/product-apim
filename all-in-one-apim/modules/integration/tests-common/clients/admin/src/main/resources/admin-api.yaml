  ######################################################
  # The "Transaction Count" resource API
  ######################################################
  /transaction-count:
    get:
      tags:
        - "Transaction Records"
      summary: "Get transaction count"
      description: "This endpoint retrieves the transaction count based on various filter parameters."
      parameters:
        - name: "startTime"
          in: "query"
          description: "Start time for the transaction count retrieval"
          required: true
          schema:
            type: "string"
        - name: "endTime"
          in: "query"
          description: "End time for the transaction count retrieval"
          required: true
          schema:
            type: "string"
      responses:
        200:
          description: "Transaction count retrieved successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionCount"
        default:
          description: "Unexpected error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security:
        - OAuth2Security:
            - apim:admin
    ######################################################
  # Export API Consumption Data
  ######################################################
  /export-consumption:
    get:
      tags:
        - Consumption
      summary: |
        Export API Consumption Data
      description: |
        This operation provides a ZIP archive containing API consumption/usage data
        for a given date range.
      parameters:
        - name: fromDate
          in: query
          description: |
            Start date of the export range (inclusive). Format: YYYY-MM-DD.
          required: true
          schema:
            type: string
        - name: toDate
          in: query
          description: |
            End date of the export range (inclusive). Format: YYYY-MM-DD.
          required: true
          schema:
            type: string
      responses:
        200:
          description: |
            OK.
            Consumption data exported successfully as a ZIP file.
          headers:
            Content-Disposition:
              description: |
                Indicates the filename for the download (e.g., consumption-report.zip).
              schema:
                type: string
            Content-Type:
              description: The content type of the body.
              schema:
                type: string
          content:
            application/zip:
              schema:
                type: string
                format: binary
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          $ref: '#/components/responses/Unauthorized'
        403:
          $ref: '#/components/responses/Forbidden'
        500:
          $ref: '#/components/responses/InternalServerError'
      security:
        - OAuth2Security:
            - apim:admin
      x-code-samples:
        - lang: Curl
          source: |
            curl -k -H "Authorization: Bearer ae4eae22-3f65-387b-a171-d37eaa366fa8" \
            "https://127.0.0.1:9443/api/am/admin/v4/export-consumption?fromDate=2026-01-01&toDate=2026-03-31" \
            > consumption-report.zip
      operationId: exportConsumptionData
