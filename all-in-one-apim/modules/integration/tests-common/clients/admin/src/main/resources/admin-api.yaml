          example: Active
          default: Active
          enum:
            - Active
            - Inactive
        vhost:
          type: string
          format: uri
          readOnly: true
          description: For platform gateway environments, the gateway URL (e.g. https://host:9443). Same as Platform Gateways API; only set when this environment represents a platform gateway.
          example: https://mg.wso2.com
