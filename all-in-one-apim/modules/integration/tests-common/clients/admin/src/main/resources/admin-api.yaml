    CreatePlatformGatewayRequest:
      title: Create Platform Gateway Request
      description: Request body for creating a platform gateway (name, displayName, vhost as URL, optional properties). Same property name as platform API; type is URL.
      required:
        - name
        - displayName
        - vhost
      type: object
      properties:
        name:
          type: string
          pattern: '^[a-z0-9-]+$'
          minLength: 3
          maxLength: 64
          description: URL-friendly gateway identifier (lowercase alphanumeric with hyphens, unique per organization)
          example: prod-gateway-01
        displayName:
          type: string
          minLength: 1
          maxLength: 128
          description: Human-readable gateway name
          example: Production Gateway 01
        description:
          type: string
          maxLength: 1023
          description: Optional description
        vhost:
          type: string
          format: uri
          description: Gateway URL (e.g. https://mg.example.com:9443). Same name as platform API; type is URL. Server persists host internally.
          example: https://mg.wso2.com
        properties:
          type: object
          additionalProperties: true
          description: Custom key-value properties for the gateway
          example: {"region": "us-west", "tier": "premium"}
        permissions:
          type: object
          description: Gateway visibility permissions configuration
          properties:
            permissionType:
              type: string
              enum: [PUBLIC, ALLOW, DENY]
              default: PUBLIC
              description: |
                Permission type for gateway visibility:
                - PUBLIC: Gateway is visible to all users
                - ALLOW: Gateway is visible only to specified roles
                - DENY: Gateway is hidden from specified roles
            roles:
              type: array
              items:
                type: string
              description: List of roles for ALLOW/DENY permission types
              example: ["admin", "publisher"]
          example:
            permissionType: ALLOW
            roles: ["admin", "publisher"]
    UpdatePlatformGatewayRequest:
      title: Update Platform Gateway Request
      description: |
        Request body for PUT /gateways/{gatewayId}. Per PUT semantics, send the full resource
        representation. Name and vhost are immutable (server validates they match the existing gateway).
      required:
        - name
        - displayName
        - vhost
      type: object
      properties:
        name:
          type: string
          pattern: '^[a-z0-9-]+$'
          minLength: 3
          maxLength: 64
          description: Gateway identifier (immutable; must match existing). Required for PUT full representation.
        vhost:
          type: string
          format: uri
          description: Gateway URL (immutable; must match existing). Same name as platform API; type is URL. Example https://mg.wso2.com
          example: https://mg.wso2.com
        displayName:
          type: string
          minLength: 1
          maxLength: 128
          description: Human-readable gateway name
          example: Production Gateway 01
        description:
          type: string
          maxLength: 1023
          description: Optional description
        properties:
          type: object
          additionalProperties: true
          description: Custom key-value properties for the gateway
          example: {"region": "us-west", "tier": "premium"}
        permissions:
          type: object
          description: Gateway visibility permissions (on-prem extension)
          properties:
            permissionType:
              type: string
              enum: [PUBLIC, ALLOW, DENY]
              default: PUBLIC
            roles:
              type: array
              items:
                type: string
              description: List of roles for ALLOW/DENY permission types
    PlatformGatewayResponse:
      title: Platform Gateway Response
      description: Platform gateway response (without registration token). Used for list and get.
      type: object
      properties:
        id:
          type: string
          readOnly: true
          description: Gateway UUID
        name:
          type: string
        displayName:
          type: string
        description:
          type: string
        properties:
          type: object
          additionalProperties: true
          description: Custom key-value properties
        vhost:
          type: string
          format: uri
          readOnly: true
          description: Gateway URL (e.g. https://host or https://host:9443). Same name as platform API; type is URL.
        isActive:
          type: boolean
          readOnly: true
          description: Indicates if the gateway is currently connected to the control plane via WebSocket
        permissions:
          type: object
          description: Gateway visibility permissions configuration
          properties:
            permissionType:
              type: string
              enum: [PUBLIC, ALLOW, DENY]
              default: PUBLIC
              description: |
                Permission type for gateway visibility:
                - PUBLIC: Gateway is visible to all users
                - ALLOW: Gateway is visible only to specified roles
                - DENY: Gateway is hidden from specified roles
            roles:
              type: array
              items:
                type: string
              description: List of roles for ALLOW/DENY permission types
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    GatewayResponseWithToken:
      title: Gateway Response With Token
