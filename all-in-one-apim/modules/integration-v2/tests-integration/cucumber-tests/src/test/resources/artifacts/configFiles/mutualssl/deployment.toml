# Extra overlay for mutual-SSL (mTLS) tests, merged on top of the shared `basic` overlay.
#
# When a client certificate is uploaded to an API, APIM adds it to the gateway trust store and the passthrough
# HTTPS listener picks it up on its next dynamic-SSL-profile read. That read interval defaults to 600000 ms
# (10 minutes) — far too long for a test to wait for the cert to become active. Shrink it to 10s so an uploaded
# client cert is honoured within seconds and the mTLS invocation can be verified in-scenario.
#
# (SSLVerifyClient already defaults to "optional" on the 8243 listener, so no other change is needed.)
[transport.http.listener.ssl_profile]
read_interval = "10000"
