log4j.rootLogger=INFO, CONSOLE, FILE, PER_GROUP

log4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender
log4j.appender.CONSOLE.layout=org.apache.log4j.PatternLayout
log4j.appender.CONSOLE.layout.ConversionPattern=%d{HH:mm:ss.SSS} [%t] %-5p %c{1} [%X{testName}] - %m%n

log4j.appender.FILE=org.apache.log4j.FileAppender
log4j.appender.FILE.File=logs/cucumber-tests.log
log4j.appender.FILE.Append=false
log4j.appender.FILE.layout=org.apache.log4j.PatternLayout
log4j.appender.FILE.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1} [%X{testName}] - %m%n

log4j.appender.PER_GROUP=org.wso2.am.integration.cucumbertests.utils.logging.PerTestGroupFileAppender
log4j.appender.PER_GROUP.LogDir=logs
log4j.appender.PER_GROUP.layout=org.apache.log4j.PatternLayout
log4j.appender.PER_GROUP.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1} - %m%n
