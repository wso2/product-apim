# Test-lane logging for the integration-v2 parallel-on-shared-container suite.
#
# With slf4j-log4j12 on the test classpath, SLF4J is bound to log4j 1.x, so Testcontainers'
# Slf4jLogConsumer - which carries each booted APIM container's stdout/stderr - is rendered here instead
# of dropped to NOP. Without this committed config CI is blind on boot failures (the server never logs).
#
# Per-block identity when K containers boot concurrently: DynamicApimContainer wires each consumer with
# Slf4jLogConsumer.withPrefix(<block label>), so every server log line is prefixed with its block label
# in %m - grep a block's label to isolate its server log from the interleaved stream. The %X{testName}
# MDC slot carries the per-test name when a test sets it (it is "default" in the v2 lane).

log4j.rootLogger=INFO, CONSOLE, FILE

# CONSOLE -> surfaces in the GitHub Actions run log (captured by "Download log archive").
log4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender
log4j.appender.CONSOLE.layout=org.apache.log4j.PatternLayout
log4j.appender.CONSOLE.layout.ConversionPattern=%d{HH:mm:ss.SSS} [%t] %-5p %c{1} [%X{testName}] - %m%n

# FILE -> consolidated server+test log; uploaded as a CI artifact (see maven.yml target/logs glob).
log4j.appender.FILE=org.apache.log4j.FileAppender
log4j.appender.FILE.File=target/logs/integration-v2-tests.log
log4j.appender.FILE.Append=false
log4j.appender.FILE.layout=org.apache.log4j.PatternLayout
log4j.appender.FILE.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p %c{1} [%X{testName}] - %m%n

# Quiet noisy transitive loggers so the server boot log stays readable.
log4j.logger.org.apache.http=WARN
log4j.logger.com.github.dockerjava=WARN
log4j.logger.org.testcontainers=INFO
