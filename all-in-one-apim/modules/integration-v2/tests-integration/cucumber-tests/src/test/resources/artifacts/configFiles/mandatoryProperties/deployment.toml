# Feature-specific TOML overlay for the IntegrationV2-MandatoryProperties block.
#
# Merged ON TOP of the shared `basic` overlay (base + basic + this) via tomlExtraOverlayPath — only the extra
# key this feature needs lives here. Declares a mandatory custom API property, so updating an API with the
# property present-but-empty is rejected (400). Ports the config of MandatoryPropertiesTestWithRestart.

[[apim.publisher.custom_properties]]
required = true
name = "PropertyName"
description = "Property Description"

# Co-located orthogonal config for the AI Design Assistant pluggable-implementation test
# (features/publisher/ai_design_assistant_bad_impl.feature, carbon-apimgt PR #13920). A deliberately
# non-existent implementation class exercises DesignAssistantServiceFactory's reflective-instantiation
# failure path, which must surface as a 500 at the /design-assistant endpoints. Orthogonal to the
# mandatory-properties config above (different table); the assistant is enabled by the distribution default.
[apim.ai]
design_assistant_impl = "org.wso2.carbon.apimgt.integration.test.NonExistentDesignAssistant"
