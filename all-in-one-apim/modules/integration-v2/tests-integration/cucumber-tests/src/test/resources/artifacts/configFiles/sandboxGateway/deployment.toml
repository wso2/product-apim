# Overlay that makes the Default gateway environment SANDBOX-ONLY. deepMerge replaces the [[apim.gateway.environment]]
# array wholesale (arrays are replace-not-merge), so this restates the distribution Default env verbatim with only
# type changed from "hybrid" to "sandbox". A sandbox-type gateway accepts sandbox keys and rejects production keys
# (401 "Production Key Provided for Sandbox Gateway"). Ports InvokeAPIWithVariousEndpointsAndTokensInSandboxEnvTestCase.
[[apim.gateway.environment]]
name = "Default"
type = "sandbox"
gateway_type = "Regular"
provider = "wso2"
display_in_api_console = true
description = "Sandbox-only gateway environment that rejects production tokens."
show_as_token_endpoint_url = true
service_url = "https://localhost:${mgt.transport.https.port}/services/"
username= "${admin.username}"
password= "${admin.password}"
ws_endpoint = "ws://localhost:9099"
wss_endpoint = "wss://localhost:8099"
http_endpoint = "http://localhost:${http.nio.port}"
https_endpoint = "https://localhost:${https.nio.port}"
websub_event_receiver_http_endpoint = "http://localhost:9021"
websub_event_receiver_https_endpoint = "https://localhost:8021"
