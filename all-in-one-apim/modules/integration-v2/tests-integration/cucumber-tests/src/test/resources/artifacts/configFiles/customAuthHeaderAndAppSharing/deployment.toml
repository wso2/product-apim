# Feature-specific TOML overlay for the IntegrationV2-CustomAuthHeaderAndAppSharing block.
#
# Merged ON TOP of the shared `basic` overlay (which is itself merged onto the product distribution
# deployment.toml) via the block's `tomlExtraOverlayPath` parameter — so only the extra keys two parked
# features need live here; everything else is inherited.
#
# The two features' config is orthogonal:
#   - custom-auth-header : the gateway reads the OAuth token from a custom header instead of Authorization.
#     This is a gateway data-plane setting; it does not change management-API (publisher/devportal/admin) auth.
#   - org/group sharing  : devportal application sharing so an application's `groups` field is honoured
#     instead of silently dropped by the default container.

[apim.oauth_config]
auth_header = "Test-Custom-Header"

[apim.devportal]
enable_application_sharing = true
application_sharing_type = "default"

# AI Marketplace Assistant default-implementation happy-path test
# point the shared AI endpoint at the canned-response stub on the node backend
# (http://nodebackend:3001/ai/..., served by node-customer-service/routes/aiAssistantRoutes.js). Using the
# auth-token branch (token set, key left empty) makes DefaultMarketplaceAssistantServiceImpl call the endpoint
# directly with an api-key header and NO external token exchange. The assistant is enabled by the distribution
# default and the resource paths default to /ai/... . Orthogonal to the two features above (different table);
# this block already runs the node backend (initBackend=true).
[apim.ai]
token = "integration-v2-ai-token"
endpoint = "http://nodebackend:3001"
