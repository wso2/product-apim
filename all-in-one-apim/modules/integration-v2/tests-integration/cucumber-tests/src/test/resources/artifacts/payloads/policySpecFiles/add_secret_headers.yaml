type: operation_policy_specification
version: v4.5.0
data:
  category: Mediation
  name: add_secret_headers
  version: v1
  displayName: add_secret_headers
  description: Add secret header values (API key and token) towards the backend.
  applicableFlows:
   - request
   - response
   - fault
  supportedGateways:
   - Synapse
  supportedApiTypes:
   - HTTP
  policyAttributes:
   - name: apiKey
     displayName: API Key
     description: Add the secret API key to the header
     type: Secret
     validationRegex: "^test.*"
     required: true
   - name: token
     displayName: Token
     description: Add the secret token to the header (Optional)
     type: Secret
     required: false
