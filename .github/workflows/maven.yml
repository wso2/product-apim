name: APIM builder

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    branches:
      - master
concurrency:
  group: ${{ github.event.number }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - id: 1
            segment: group1
          - id: 2
            segment: group2
          - id: 3
            segment: group3
          - id: 4
            segment: group4
      fail-fast: false
    steps:
    - name: Run hostname
      run: hostname
    - name: Fix host entry
      run: sudo echo "127.0.0.1 $(hostname)" | sudo tee -a /etc/hosts
    - name: Show hosts
      run: cat /etc/hosts
    - name: Checkout master
      uses: actions/checkout@v3
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2
        restore-keys: ${{ runner.os }}-m2
    - name: Set up JDK 21
      uses: actions/setup-java@v2
      with:
        java-version: 21
        distribution: 'temurin'
    - uses: actions/setup-node@v1
      with:
        node-version: '10.x'
    - name: Build product-apim with Test.
      run: mvn clean install --file all-in-one-apim/pom.xml -DskipBenchMarkTest=true -DskipRestartTests=true
      env:
        PRODUCT_APIM_TEST_GROUPS: ${{ matrix.segment }}
    - name: Prepare upload testng report
      if: always()
      run: mv all-in-one-apim/modules/integration/tests-integration/tests-backend/target/surefire-reports/TEST-TestSuite.xml TEST-TestSuite_${{ matrix.id }}.xml
    - name: Archive testng report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TEST-TestSuite_${{ matrix.id }}
        path: |
          TEST-TestSuite_${{ matrix.id }}.xml
        if-no-files-found: warn
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        flags: integration_tests
  run-benchmark-test:
    runs-on: ubuntu-latest
    steps:
      - name: Run hostname
        run: hostname
      - name: Fix host entry
        run: sudo echo "127.0.0.1 $(hostname)" | sudo tee -a /etc/hosts
      - name: Show hosts
        run: cat /etc/hosts
      - name: Checkout master
        uses: actions/checkout@v3
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2
          restore-keys: ${{ runner.os }}-m2
      - name: Set up JDK 21
        uses: actions/setup-java@v2
        with:
          java-version: 21
          distribution: 'temurin'
      - uses: actions/setup-node@v3
        with:
          node-version: '10.x'
      - name: Build product-apim with Test.
        run: mvn clean install -U --file all-in-one-apim/pom.xml -DskipIntegrationTests=true
  show-report:
    if: ${{ always() && !cancelled() }}
    needs: build
    runs-on: 'ubuntu-latest'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports
      - name: Publish Test Report
        if: always()
        uses: malinthaprasan/action-surefire-report@v1
        with:
          report_paths: 'reports/**/TEST-*.xml'
  # Builds the distribution + Docker images ONCE, then shares the images (docker save -> artifact) and the
  # Maven repo (run-scoped cache) with the integration-v2 matrix. The image-build execs in the testcontainers
  # module bind to pre-integration-test, which `mvn install` runs but `mvn test` does not - so matrix entries
  # `docker load` these images and never rebuild them.
  v2-build-images:
    runs-on: ubuntu-latest
    steps:
      - name: Run hostname
        run: hostname
      - name: Fix host entry
        run: sudo echo "127.0.0.1 $(hostname)" | sudo tee -a /etc/hosts
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      # Run-scoped key so the matrix restores exactly this run's repo (incl. the 4.7.0-SNAPSHOT artifacts the
      # dist build installs); restore-keys warm-starts from the shared cache.
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-v2-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build APIM distribution (skip tests)
        run: >
          mvn clean install -f all-in-one-apim/pom.xml
          -Dmaven.test.skip=true -DskipBenchMarkTest=true -DskipRestartTests=true
      - name: Build APIM + node Docker images (no suite)
        working-directory: all-in-one-apim/modules/integration-v2
        run: >
          mvn install -pl tests-integration/cucumber-tests -am -DskipTests
          -Ddocker.extra.hosts="--add-host=host.docker.internal:host-gateway"
      - name: Save Docker images
        run: |
          mkdir -p /tmp/v2-images
          docker save wso2am:4.7.0-SNAPSHOT-jdk21 node-app-server:latest | gzip > /tmp/v2-images/images.tar.gz
      - name: Upload Docker images
        uses: actions/upload-artifact@v4
        with:
          name: v2-images
          path: /tmp/v2-images/images.tar.gz
          retention-days: 1
          if-no-files-found: error
  integration-v2:
    needs: v2-build-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: v2-1
            suite: testng-v2.xml
    steps:
      - name: Run hostname
        run: hostname
      - name: Fix host entry
        run: sudo echo "127.0.0.1 $(hostname)" | sudo tee -a /etc/hosts
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Restore Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-v2-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-m2
      - name: Download Docker images
        uses: actions/download-artifact@v4
        with:
          name: v2-images
          path: /tmp/v2-images
      - name: Load Docker images
        run: docker load < /tmp/v2-images/images.tar.gz
      # `mvn test` (not install) keeps the testcontainers pre-integration-test image-build execs from firing,
      # so the loaded images are reused. `-am` builds only the integration-v2 reactor deps up to the test
      # phase; product 4.7.0-SNAPSHOT artifacts resolve from the restored Maven repo.
      - name: Run integration-v2 suite (reuses prebuilt images)
        working-directory: all-in-one-apim/modules/integration-v2
        run: >
          mvn test -pl tests-integration/cucumber-tests -am
          -Dsurefire.suite.xml=${{ matrix.suite }}
          -Ddocker.extra.hosts="--add-host=host.docker.internal:host-gateway"
      - name: Archive test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-v2-reports-${{ matrix.id }}
          path: |
            all-in-one-apim/modules/integration-v2/tests-integration/cucumber-tests/target/surefire-reports/**
            all-in-one-apim/modules/integration-v2/tests-integration/cucumber-tests/target/cucumber-report/**
            all-in-one-apim/modules/integration-v2/tests-integration/cucumber-tests/target/logs/**
          if-no-files-found: warn
