name: APIM Database Migration Tests

on:
  workflow_dispatch: {}
  schedule:
    # Run nightly build at 00:00 UTC
    - cron: '0 0 * * *'

jobs:
  update-and-build:
    runs-on: codebuild-wso2_product-apim-${{ github.run_id }}-${{ github.run_attempt }}

    permissions:
      contents: write

    outputs:
      latest_version: ${{ env.LATEST_CARBON_APIMGT_VERSION }}
      current_version: ${{ env.CURRENT_CARBON_APIMGT_VERSION }}
      dist_path: ${{ steps.find_dist.outputs.dist_path }}

    env:
      CARBON_APIMGT_REPO: https://github.com/wso2/carbon-apimgt.git
      CARBON_APIMGT_VERSION_PROPERTY: carbon.apimgt.version

    steps:
      - name: Checkout product-apim
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Find latest carbon-apimgt version tag
        id: find_version
        run: |
          git ls-remote --tags "$CARBON_APIMGT_REPO" \
            | awk '{print $2}' \
            | grep -E 'refs/tags/v?[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed 's#refs/tags/##' \
            | sed 's/^v//' \
            | sort -V \
            | tail -n1 > latest_carbon_apimgt_version.txt

          LATEST=$(cat latest_carbon_apimgt_version.txt)
          echo "Latest carbon-apimgt version: $LATEST"
          echo "LATEST_CARBON_APIMGT_VERSION=$LATEST" >> $GITHUB_ENV
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Read current carbon-apimgt version from Maven
        working-directory: all-in-one-apim
        run: |
          CURRENT=$(mvn -q \
            -Dexpression=${CARBON_APIMGT_VERSION_PROPERTY} \
            -DforceStdout \
            help:evaluate 2>/dev/null || true)

          echo "Current carbon-apimgt version: $CURRENT"
          echo "CURRENT_CARBON_APIMGT_VERSION=$CURRENT" >> $GITHUB_ENV

      - name: Update pom.xml with latest carbon-apimgt version
        if: env.LATEST_CARBON_APIMGT_VERSION != '' && env.LATEST_CARBON_APIMGT_VERSION != env.CURRENT_CARBON_APIMGT_VERSION
        working-directory: all-in-one-apim
        run: |
          echo "Updating ${CARBON_APIMGT_VERSION_PROPERTY} from ${CURRENT_CARBON_APIMGT_VERSION} to ${LATEST_CARBON_APIMGT_VERSION}"

          mvn -B \
            org.codehaus.mojo:versions-maven-plugin:2.16.2:set-property \
            -Dproperty=${CARBON_APIMGT_VERSION_PROPERTY} \
            -DnewVersion=${LATEST_CARBON_APIMGT_VERSION} \
            -DgenerateBackupPoms=false

      - name: Build APIM distribution
        working-directory: all-in-one-apim
        run: |
          mvn -B clean install -Dmaven.test.skip=true

      - name: Find built APIM distribution
        id: find_dist
        run: |
          DIST_PATH=$(find all-in-one-apim/modules/distribution/product/target \
            -maxdepth 1 -type f -name "wso2am-*-SNAPSHOT.zip" | head -n1)
          if [ -z "$DIST_PATH" ]; then
            echo "Distribution zip (wso2am-*-SNAPSHOT.zip) not found"
            exit 1
          fi
          echo "dist_path=$DIST_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APIM distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: apim-distribution
          path: ${{ steps.find_dist.outputs.dist_path }}
          retention-days: 7
          if-no-files-found: error

  prepare-and-migrate:
    needs: update-and-build
    name: prepare-and-migrate - ${{ matrix.display_name }}
    runs-on: codebuild-wso2_product-apim-${{ github.run_id }}-${{ github.run_attempt }}
    permissions:
      id-token: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - db_type: mysql
            display_name: "MySQL"
            apim_url: "jdbc:mysql://host.docker.internal:3306/WSO2AM_APIMGT_DB?allowPublicKeyRetrieval=true&amp;useSSL=false"
            shared_url: "jdbc:mysql://host.docker.internal:3307/WSO2AM_COMMON_DB?allowPublicKeyRetrieval=true&amp;useSSL=false"
            driver_class: "com.mysql.cj.jdbc.Driver"
            validation_query: "SELECT 1"
            apim_username: "apim_user"
            shared_username: "shared_user"
            apim_password: "apimpass"
            shared_password: "sharedpass"

          - db_type: mssql
            display_name: "MSSQL"
            apim_url: "jdbc:sqlserver://host.docker.internal:1433;databaseName=apim_db;SendStringParametersAsUnicode=false;integratedSecurity=false;encrypt=false"
            shared_url: "jdbc:sqlserver://host.docker.internal:1434;databaseName=shared_db;SendStringParametersAsUnicode=false;integratedSecurity=false;encrypt=false"
            driver_class: "com.microsoft.sqlserver.jdbc.SQLServerDriver"
            validation_query: "SELECT 1"
            apim_username: "apim_user"
            shared_username: "shared_user"
            apim_password: "apimpass"
            shared_password: "sharedpass"

          - db_type: postgre
            display_name: "PostgreSQL"
            apim_url: "jdbc:postgresql://host.docker.internal:5432/apim_db"
            shared_url: "jdbc:postgresql://host.docker.internal:5433/shared_db"
            driver_class: "org.postgresql.Driver"
            validation_query: "SELECT 1"
            apim_username: "apim_user"
            shared_username: "shared_user"
            apim_password: "apimpass"
            shared_password: "sharedpass"

          - db_type: oracle
            display_name: "Oracle"
            apim_url: "jdbc:oracle:thin:@host.docker.internal:1521/XEPDB1"
            shared_url: "jdbc:oracle:thin:@host.docker.internal:1522/XEPDB1"
            driver_class: "oracle.jdbc.OracleDriver"
            validation_query: "SELECT 1 FROM DUAL"
            apim_username: "APIM_DB_USER"
            shared_username: "SHARED_DB_USER"
            apim_password: "apimpass"
            shared_password: "sharedpass"

    env:
      # API Manager Database (apim_db)
      API_MANAGER_DATABASE_TYPE: ${{ matrix.db_type }}
      API_MANAGER_DATABASE_DRIVER: ${{ matrix.driver_class }}
      API_MANAGER_DATABASE_URL: ${{ matrix.apim_url }}
      API_MANAGER_DATABASE_USERNAME: ${{ matrix.apim_username }}
      API_MANAGER_DATABASE_PASSWORD: ${{ matrix.apim_password }}
      API_MANAGER_DATABASE_VALIDATION_QUERY: ${{ matrix.validation_query }}

      # Shared Database (shared_db)
      SHARED_DATABASE_TYPE: ${{ matrix.db_type }}
      SHARED_DATABASE_DRIVER: ${{ matrix.driver_class }}
      SHARED_DATABASE_URL: ${{ matrix.shared_url }}
      SHARED_DATABASE_USERNAME: ${{ matrix.shared_username }}
      SHARED_DATABASE_PASSWORD: ${{ matrix.shared_password }}
      SHARED_DATABASE_VALIDATION_QUERY: ${{ matrix.validation_query }}

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Start Database Containers
        run: |
          if [ "${{ matrix.db_type }}" == "mysql" ]; then
          
            docker run -d --name apim_db \
              -e MYSQL_ROOT_PASSWORD=rootpass \
              -e MYSQL_DATABASE=WSO2AM_APIMGT_DB \
              -e MYSQL_USER=apim_user \
              -e MYSQL_PASSWORD=apimpass \
              -p 3306:3306 mysql:8.0
            
            docker run -d --name shared_db \
              -e MYSQL_ROOT_PASSWORD=rootpass \
              -e MYSQL_DATABASE=WSO2AM_COMMON_DB \
              -e MYSQL_USER=shared_user \
              -e MYSQL_PASSWORD=sharedpass \
              -p 3307:3306 mysql:8.0
          
          elif [ "${{ matrix.db_type }}" == "mssql" ]; then
            echo "Starting Azure SQL Edge for APIM DB..."
            docker run -d --name apim_db \
              -e ACCEPT_EULA="Y" \
              -e MSSQL_SA_PASSWORD='RootPass123!' \
              -e MSSQL_PID="Developer" \
              -p 1433:1433 \
              mcr.microsoft.com/azure-sql-edge

            echo "Starting Azure SQL Edge for Shared DB..."
            docker run -d --name shared_db \
              -e ACCEPT_EULA="Y" \
              -e MSSQL_SA_PASSWORD='RootPass123!' \
              -e MSSQL_PID="Developer" \
              -p 1434:1433 \
              mcr.microsoft.com/azure-sql-edge
            
            # Wait until SQL Edge accepts connections before running DDL
            for i in {1..60}; do
              if docker exec apim_db /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'RootPass123!' -Q "SELECT 1" >/dev/null 2>&1; then
                break
              fi
              echo "Waiting for apim_db SQL Edge startup... ($i/60)"
              sleep 2
            done
            # Fail if database is still not ready
            if ! docker exec apim_db /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'RootPass123!' -Q "SELECT 1" >/dev/null 2>&1; then
              echo "ERROR: apim_db failed to start within timeout"
              exit 1
            fi

            for i in {1..60}; do
              if docker exec shared_db /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'RootPass123!' -Q "SELECT 1" >/dev/null 2>&1; then
                break
              fi
              echo "Waiting for shared_db SQL Edge startup... ($i/60)"
              sleep 2
            done
            # Fail if database is still not ready
            if ! docker exec shared_db /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'RootPass123!' -Q "SELECT 1" >/dev/null 2>&1; then
              echo "ERROR: shared_db failed to start within timeout"
              exit 1
            fi
            
            echo "Creating APIM Database and Login..."
            docker exec apim_db /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'RootPass123!' -Q "CREATE DATABASE apim_db; CREATE LOGIN apim_user WITH PASSWORD = 'apimpass', CHECK_POLICY = OFF;"
            
            echo "Mapping APIM User to Database..."
            docker exec apim_db /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'RootPass123!' -d apim_db -Q "CREATE USER apim_user FOR LOGIN apim_user; ALTER ROLE db_owner ADD MEMBER apim_user;"
    
            echo "Creating Shared Database and Login..."
            docker exec shared_db /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'RootPass123!' -Q "CREATE DATABASE shared_db; CREATE LOGIN shared_user WITH PASSWORD = 'sharedpass', CHECK_POLICY = OFF;"
            
            echo "Mapping Shared User to Database..."
            docker exec shared_db /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'RootPass123!' -d shared_db -Q "CREATE USER shared_user FOR LOGIN shared_user; ALTER ROLE db_owner ADD MEMBER shared_user;"
          
          elif [ "${{ matrix.db_type }}" == "postgre" ]; then
            echo "Starting PostgreSQL for APIM DB..."
            docker run -d --name apim_db \
              -e POSTGRES_DB=apim_db \
              -e POSTGRES_USER=apim_user \
              -e POSTGRES_PASSWORD=apimpass \
              -p 5432:5432 postgres:14
            
            echo "Starting PostgreSQL for Shared DB..."
            docker run -d --name shared_db \
              -e POSTGRES_DB=shared_db \
              -e POSTGRES_USER=shared_user \
              -e POSTGRES_PASSWORD=sharedpass \
              -p 5433:5432 postgres:14
          
          elif [ "${{ matrix.db_type }}" == "oracle" ]; then
            echo "Starting Oracle XE for APIM DB..."
            # gvenzl/oracle-xe automatically provisions the APP_USER and grants required quotas
            docker run -d --name apim_db \
              -p 1521:1521 \
              -e ORACLE_PASSWORD=rootpass \
              -e APP_USER=APIM_DB_USER \
              -e APP_USER_PASSWORD=apimpass \
              gvenzl/oracle-xe:21-slim-faststart
          
            echo "Starting Oracle XE for Shared DB..."
            docker run -d --name shared_db \
              -p 1522:1521 \
              -e ORACLE_PASSWORD=rootpass \
              -e APP_USER=SHARED_DB_USER \
              -e APP_USER_PASSWORD=sharedpass \
              gvenzl/oracle-xe:21-slim-faststart
          fi


      - name: Checkout master-new-test-framework branch
        uses: actions/checkout@v4
        with:
          ref: master-new-test-framework
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Download APIM distribution artifact (built from master)
        uses: actions/download-artifact@v4
        with:
          name: apim-distribution
          path: ./artifacts

      - name: Find and extract distribution archive
        run: |
          # Look for wso2am-*-SNAPSHOT.zip (built from master branch)
          DIST_ARCHIVE=$(find artifacts -name "wso2am-*-SNAPSHOT.zip" | head -n1)
          if [ -z "$DIST_ARCHIVE" ]; then
            echo "wso2am-*-SNAPSHOT.zip not found in artifacts"
            ls -la artifacts/
            exit 1
          fi
          
          echo "Found archive: $DIST_ARCHIVE"
          echo "DIST_ARCHIVE=$DIST_ARCHIVE" >> $GITHUB_ENV
          
          # Extract to temp directory
          mkdir -p unpacked-dist
          unzip -q "$DIST_ARCHIVE" -d unpacked-dist
          
          # Find the extracted directory (should be wso2am-4.6.0-SNAPSHOT)
          EXTRACTED_DIR=$(find unpacked-dist -maxdepth 1 -type d -name "wso2am-*" | head -n1)
          if [ -z "$EXTRACTED_DIR" ]; then
            echo "Extracted directory not found"
            ls -la unpacked-dist/
            exit 1
          fi
          echo "EXTRACTED_DIR=$EXTRACTED_DIR" >> $GITHUB_ENV

      - name: Add JDBC driver to distribution
        run: |
          REPO_LIB_DIR="$EXTRACTED_DIR/repository/components/lib"
          JDBC_URL="https://repo1.maven.org/maven2/mysql/mysql-connector-java/8.0.30/mysql-connector-java-8.0.30.jar"
          
          mkdir -p "$REPO_LIB_DIR"
          if [ "${{ matrix.db_type }}" == "mysql" ]; then
            wget -q -O mysql-connector-java-8.0.30.jar "https://repo1.maven.org/maven2/mysql/mysql-connector-java/8.0.30/mysql-connector-java-8.0.30.jar"
            mv mysql-connector-java-8.0.30.jar "$REPO_LIB_DIR"
          elif [ "${{ matrix.db_type }}" == "mssql" ]; then
            wget -q -O mssql-jdbc-12.4.2.jre11.jar "https://repo1.maven.org/maven2/com/microsoft/sqlserver/mssql-jdbc/12.4.2.jre11/mssql-jdbc-12.4.2.jre11.jar"
            mv mssql-jdbc-12.4.2.jre11.jar "$REPO_LIB_DIR"
          elif [ "${{ matrix.db_type }}" == "postgre" ]; then
            wget -q -O postgresql-42.7.8.jar "https://repo1.maven.org/maven2/org/postgresql/postgresql/42.7.8/postgresql-42.7.8.jar"
            mv postgresql-42.7.8.jar "$REPO_LIB_DIR"
          elif [ "${{ matrix.db_type }}" == "oracle" ]; then
            wget -q -O ojdbc8-19.23.0.0.jar "https://repo1.maven.org/maven2/com/oracle/database/jdbc/ojdbc8/19.23.0.0/ojdbc8-19.23.0.0.jar"
            mv ojdbc8-19.23.0.0.jar "$REPO_LIB_DIR"
          fi
          echo "JDBC driver added to $REPO_LIB_DIR"

      - name: Replace keystore and truststore of distribution
        run: |
          SECURITY_DIR="$EXTRACTED_DIR/repository/resources/security"
          mkdir -p "$SECURITY_DIR"
          
          # Delete existing keystore and truststore files
          rm -f "$SECURITY_DIR"/*.jks "$SECURITY_DIR"/*.p12
          
          # Copy new keystore and truststore files from master-new-test-framework branch
          cp all-in-one-apim/modules/integration-v2/client-truststore.jks "$SECURITY_DIR/"
          cp all-in-one-apim/modules/integration-v2/wso2carbon.jks "$SECURITY_DIR/"
          
          echo "Keystore and truststore files replaced in $SECURITY_DIR"

      - name: Configure deployment.toml with database settings
        run: |
          DEPLOYMENT_TOML="$EXTRACTED_DIR/repository/conf/deployment.toml"
          
          # Backup original deployment.toml
          cp "$DEPLOYMENT_TOML" "$DEPLOYMENT_TOML.backup"
          
          # Read the original file and remove existing sections
          # Remove existing database.apim_db, database.shared_db, apim.gateway.environment, and apim.sync_runtime_artifacts.gateway sections
          awk '
            /^\[database\.apim_db\]/ { skip=1; next }
            /^\[database\.shared_db\]/ { skip=1; next }
            /^\[\[apim\.gateway\.environment\]\]/ { skip=1; next }
            /^\[apim\.sync_runtime_artifacts\.gateway\]/ { skip=1; next }
            /^\[\[/ && skip { skip=0; print; next }
            /^\[/ && skip { skip=0; print; next }
            skip { next }
            !skip { print }
          ' "$DEPLOYMENT_TOML.backup" > "$DEPLOYMENT_TOML.tmp"

          # Append database configurations and gateway environment from static template
          cat .github/WORKFLOW_ARTIFACTS/migration-deployment.toml >> "$DEPLOYMENT_TOML.tmp"
          
          mv "$DEPLOYMENT_TOML.tmp" "$DEPLOYMENT_TOML"
          
          echo "deployment.toml configured with database settings and gateway environment"
          echo "=== Updated deployment.toml ==="
          tail -30 "$DEPLOYMENT_TOML"

      - name: Re-zip distribution
        run: |
          # Get the version from the extracted directory name
          DIST_NAME=$(basename "$EXTRACTED_DIR")
          TARGET_DIR="all-in-one-apim/modules/distribution/product/target"
          mkdir -p "$TARGET_DIR"
          
          # Get absolute path to ensure we're working from the right location
          WORKSPACE=$(pwd)
          TARGET_PATH="$WORKSPACE/$TARGET_DIR/$DIST_NAME.zip"
          
          cd unpacked-dist
          zip -r "$TARGET_PATH" "$DIST_NAME"
          cd "$WORKSPACE"
          
          echo "Created: $TARGET_PATH"
          ls -lh "$TARGET_PATH"
          
          # Verify the file exists
          if [ ! -f "$TARGET_PATH" ]; then
            echo "ERROR: Zip file was not created at $TARGET_PATH"
            exit 1
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-mysql-client python3 python3-pip

          # Docker is already available in GitHub Actions runners
          docker --version

      - name: Wait for DBs to be ready
        run: |
          if [ "${{ matrix.db_type }}" == "mysql" ]; then
            echo "Waiting for MySQL databases..."
            for i in {1..60}; do
              if docker exec apim_db mysqladmin ping -h localhost -uroot -prootpass --silent 2>/dev/null; then
                echo "apim_db is ready"
                break
              fi
              if [ $i -eq 60 ]; then
                echo "::error::MySQL apim_db failed to start after 120 seconds."
                echo "Fetching container logs for debugging:"
                docker logs apim_db
                exit 1
              fi
              echo "Waiting for apim_db... ($i/60)"
              sleep 2
            done
          
            for i in {1..60}; do
              if docker exec shared_db mysqladmin ping -h localhost -uroot -prootpass --silent 2>/dev/null; then
                echo "shared_db is ready"
                break
              fi
              if [ $i -eq 60 ]; then
                echo "::error::MySQL shared_db failed to start after 120 seconds."
                echo "Fetching container logs for debugging:"
                docker logs shared_db
                exit 1
              fi
              echo "Waiting for shared_db... ($i/60)"
              sleep 2
            done
          
            # Configure APIM database using docker exec
            docker exec apim_db mysql -uroot -prootpass -e "ALTER DATABASE WSO2AM_APIMGT_DB CHARACTER SET latin1 COLLATE latin1_swedish_ci;"
          
            # Configure Shared database using docker exec
            docker exec shared_db mysql -uroot -prootpass -e "ALTER DATABASE WSO2AM_COMMON_DB CHARACTER SET latin1 COLLATE latin1_swedish_ci;"
          
            echo "MySQL databases configured successfully"
          
          elif [ "${{ matrix.db_type }}" == "mssql" ]; then
            echo "Waiting for MSSQL databases..."
            for i in {1..60}; do
              if docker exec apim_db /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'RootPass123!' -Q "SELECT 1" &> /dev/null; then
                echo "apim_db is ready"
                break
              fi
              if [ $i -eq 60 ]; then
                echo "::error::MSSQL apim_db failed to start after 120 seconds."
                echo "Fetching container logs for debugging:"
                docker logs apim_db
                exit 1
              fi
              echo "Waiting for apim_db... ($i/60)"
              sleep 2
            done
          
            for i in {1..60}; do
              if docker exec shared_db /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'RootPass123!' -Q "SELECT 1" &> /dev/null; then
                echo "shared_db is ready"
                break
              fi
              if [ $i -eq 60 ]; then
                echo "::error::MSSQL shared_db failed to start after 120 seconds."
                echo "Fetching container logs for debugging:"
                docker logs shared_db
                exit 1
              fi
              echo "Waiting for shared_db... ($i/60)"
              sleep 2
            done
          
            echo "MSSQL databases are responding successfully!"
          
            echo "Applying MSSQL concurrency fix..."
            docker exec apim_db /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'RootPass123!' -Q "ALTER DATABASE apim_db SET READ_COMMITTED_SNAPSHOT ON WITH ROLLBACK IMMEDIATE;"
            docker exec shared_db /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'RootPass123!' -Q "ALTER DATABASE shared_db SET READ_COMMITTED_SNAPSHOT ON WITH ROLLBACK IMMEDIATE;"
          
          elif [ "${{ matrix.db_type }}" == "postgre" ]; then
            echo "Waiting for PostgreSQL databases..."
            for i in {1..60}; do
              # pg_isready is a built-in postgres tool to check connection status
              if docker exec apim_db pg_isready -U apim_user -d apim_db > /dev/null 2>&1; then
                echo "apim_db is ready"
                break
              fi
              if [ $i -eq 60 ]; then
                echo "::error::PostgreSQL apim_db failed to start after 120 seconds."
                echo "Fetching container logs for debugging:"
                docker logs apim_db
                exit 1
              fi
              echo "Waiting for apim_db... ($i/60)"
              sleep 2
            done
          
            for i in {1..60}; do
              if docker exec shared_db pg_isready -U shared_user -d shared_db > /dev/null 2>&1; then
                echo "shared_db is ready"
                break
              fi
              if [ $i -eq 60 ]; then
                  echo "::error::PostgreSQL shared_db failed to start after 120 seconds."
                  echo "Fetching container logs for debugging:"
                  docker logs shared_db
                  exit 1
              fi
              echo "Waiting for shared_db... ($i/60)"
              sleep 2
            done
          
            echo "PostgreSQL databases are responding successfully!"
            
            echo "Granting SUPERUSER permission to apim_user..."
            docker exec -e PGPASSWORD=apimpass apim_db psql -U apim_user -d apim_db -c "ALTER USER apim_user WITH SUPERUSER;"
          
            echo "Granting SUPERUSER permission to shared_user..."
            docker exec -e PGPASSWORD=sharedpass shared_db psql -U shared_user -d shared_db -c "ALTER USER shared_user WITH SUPERUSER;"
          
            echo "PostgreSQL setup fully complete!"
          
          elif [ "${{ matrix.db_type }}" == "oracle" ]; then
            echo "Waiting for Oracle databases to accept connections..."
          
            # Wait for apim_db
            for i in {1..60}; do
              if docker exec apim_db bash -c "echo 'SELECT 1 FROM DUAL;' | sqlplus -s sys/rootpass@//localhost:1521/XEPDB1 as sysdba" > /dev/null 2>&1; then
                echo "apim_db is ready!"
                break
              fi
              if [ $i -eq 60 ]; then
                echo "::error::Oracle apim_db failed to start after 10 minutes."
                echo "Fetching last 100 lines of container logs for debugging:"
                docker logs apim_db --tail 100
                exit 1
              fi
              echo "Waiting for apim_db... ($i/60)"
              sleep 10
            done

            # Wait for shared_db
            for i in {1..60}; do
              if docker exec shared_db bash -c "echo 'SELECT 1 FROM DUAL;' | sqlplus -s sys/rootpass@//localhost:1521/XEPDB1 as sysdba" > /dev/null 2>&1; then
                echo "shared_db is ready!"
                break
              fi
              if [ $i -eq 60 ]; then
                echo "::error::Oracle shared_db failed to start after 10 minutes."
                echo "Fetching last 100 lines of container logs for debugging:"
                docker logs shared_db --tail 100
                exit 1
              fi
              echo "Waiting for shared_db... ($i/60)"
              sleep 10
            done
          
            echo "Applying explicit permissions to APIM_DB_USER..."
            docker exec apim_db bash -c "echo -e 'GRANT CREATE SESSION, CREATE TABLE, CREATE SEQUENCE, CREATE TRIGGER, CREATE PROCEDURE TO APIM_DB_USER;\nEXIT;' | sqlplus -s sys/rootpass@//localhost:1521/XEPDB1 as sysdba"
          
            echo "Applying explicit permissions to SHARED_DB_USER..."
            docker exec shared_db bash -c "echo -e 'GRANT CREATE SESSION, CREATE TABLE, CREATE SEQUENCE, CREATE TRIGGER, CREATE PROCEDURE TO SHARED_DB_USER;\nEXIT;' | sqlplus -s sys/rootpass@//localhost:1521/XEPDB1 as sysdba"

            echo "Increasing Oracle process limit to 500 to prevent PoolExhaustedExceptions..."
            docker exec apim_db bash -c "echo -e 'ALTER SYSTEM SET PROCESSES=500 SCOPE=SPFILE;\nEXIT;' | sqlplus -s sys/rootpass as sysdba"
            docker exec shared_db bash -c "echo -e 'ALTER SYSTEM SET PROCESSES=500 SCOPE=SPFILE;\nEXIT;' | sqlplus -s sys/rootpass as sysdba"
          
            echo "Restarting Oracle containers to apply limits..."
            docker restart apim_db shared_db
          
            # Brief sleep to allow Oracle to come back up after the restart
            echo "Waiting for databases to come back up after restart..."
            
            for db in apim_db shared_db; do
              for i in {1..60}; do
                if docker exec "$db" bash -c "printf '%s\n' 'WHENEVER SQLERROR EXIT SQL.SQLCODE' 'SELECT 1 FROM DUAL;' 'EXIT;' | sqlplus -s sys/rootpass@//localhost:1521/XEPDB1 as sysdba" > /dev/null 2>&1; then
                  break
                fi
                if [ $i -eq 60 ]; then
                  echo "::error::Oracle $db failed to come back after restart."
                  docker logs "$db" --tail 100
                  exit 1
                fi
                sleep 10
              done
            done
          
          fi

      - name: Verify APIM 3.2.0 database dumps exist
        run: |
          # Determine the correct folder based on the matrix DB type
          if [ "${{ matrix.db_type }}" == "mysql" ]; then
            DB_DIR=".github/WORKFLOW_ARTIFACTS/DB_DUMPS/MYSQL"
          elif [ "${{ matrix.db_type }}" == "mssql" ]; then
            DB_DIR=".github/WORKFLOW_ARTIFACTS/DB_DUMPS/MSSQL"
          elif [ "${{ matrix.db_type }}" == "postgre" ]; then
            DB_DIR=".github/WORKFLOW_ARTIFACTS/DB_DUMPS/POSTGRESQL"
          elif [ "${{ matrix.db_type }}" == "oracle" ]; then
            DB_DIR=".github/WORKFLOW_ARTIFACTS/DB_DUMPS/ORACLE"
          fi
          
          echo "Using checked-in APIM 3.2.0 DB dumps from $DB_DIR"
          
          # List the files for debugging purposes
          ls -lh $DB_DIR/
          
          # Hard fail 3.2.0 db dumps are missing
          if [ "${{ matrix.db_type }}" == "oracle" ]; then
            test -f $DB_DIR/apim_db_dump_oracle_320.dmp
            test -f $DB_DIR/shared_db_dump_oracle_320.dmp
          else
            test -f $DB_DIR/apim_db_320_dump.sql
            test -f $DB_DIR/shared_db_320_dump.sql
          fi

      - name: Restore APIM DB dump (3.2.0)
        run: |
          if [ "${{ matrix.db_type }}" == "mysql" ]; then
            DUMP_FILE=".github/WORKFLOW_ARTIFACTS/DB_DUMPS/MYSQL/apim_db_320_dump.sql"
            echo "Restoring MySQL APIM dump..."
          
            # Copy SQL inside container
            docker cp $DUMP_FILE apim_db:/apim_db_dump.sql
          
            # Restore dump using mysql client
            docker exec -i apim_db bash -c "cat /apim_db_dump.sql | mysql -uapim_user -papimpass WSO2AM_APIMGT_DB"
          
          elif [ "${{ matrix.db_type }}" == "mssql" ]; then
            DUMP_FILE=".github/WORKFLOW_ARTIFACTS/DB_DUMPS/MSSQL/apim_db_320_dump.sql"
            echo "Restoring MSSQL APIM dump..."
          
            # Copy SQL inside container
            docker cp $DUMP_FILE apim_db:/apim_db_dump.sql
          
            # Restore dump using sqlcmd (-i flag specifies the input file)
            docker exec -i apim_db /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'RootPass123!' -d apim_db -C -i /apim_db_dump.sql
          
          elif [ "${{ matrix.db_type }}" == "postgre" ]; then
            DUMP_FILE=".github/WORKFLOW_ARTIFACTS/DB_DUMPS/POSTGRESQL/apim_db_320_dump.sql"
            echo "Restoring PostgreSQL APIM dump..."
          
            # Copy SQL inside container
            docker cp $DUMP_FILE apim_db:/apim_db_dump.sql
          
            # Restore dump using psql
            docker exec -i -e PGPASSWORD=apimpass apim_db psql -U apim_user -d apim_db -f /apim_db_dump.sql
          
          elif [ "${{ matrix.db_type }}" == "oracle" ]; then
            DUMP_FILE=".github/WORKFLOW_ARTIFACTS/DB_DUMPS/ORACLE/apim_db_dump_oracle_320.dmp"
            echo "Restoring Oracle APIM dump using Data Pump (impdp)..."
          
            # Create a directory for the dump inside the container
            docker exec -i apim_db bash -c "mkdir -p /tmp/dpdump"
          
            # Copy the dump file into the container
            docker cp $DUMP_FILE apim_db:/tmp/dpdump/apim_db_dump_oracle_320.dmp
          
            # Create Oracle directory inside the PDB, grant permissions, and run import
            docker exec -i apim_db bash -c "echo -e \"CREATE OR REPLACE DIRECTORY dp_dir AS '/tmp/dpdump';\nGRANT READ, WRITE ON DIRECTORY dp_dir TO APIM_DB_USER;\nEXIT;\" | sqlplus -s sys/rootpass@//localhost:1521/XEPDB1 as sysdba && \
              impdp APIM_DB_USER/apimpass@//localhost:1521/XEPDB1 directory=dp_dir dumpfile=apim_db_dump_oracle_320.dmp logfile=apim_impdp.log full=y"
          fi
          
          echo "APIM DB dump restored successfully"

      - name: Restore Shared DB dump (3.2.0)
        run: |
          if [ "${{ matrix.db_type }}" == "mysql" ]; then
            DUMP_FILE=".github/WORKFLOW_ARTIFACTS/DB_DUMPS/MYSQL/shared_db_320_dump.sql"
            echo "Restoring MySQL Shared dump from $DUMP_FILE..."
          
            # Copy SQL inside container
            docker cp "$DUMP_FILE" shared_db:/shared_db_dump.sql
          
            # Restore dump
            docker exec -i shared_db bash -c "cat /shared_db_dump.sql | mysql -ushared_user -psharedpass WSO2AM_COMMON_DB"
          
          elif [ "${{ matrix.db_type }}" == "mssql" ]; then
            DUMP_FILE=".github/WORKFLOW_ARTIFACTS/DB_DUMPS/MSSQL/shared_db_320_dump.sql"
            echo "Restoring MSSQL Shared dump from $DUMP_FILE..."
          
            # Copy SQL inside container
            docker cp "$DUMP_FILE" shared_db:/shared_db_dump.sql
          
            # Restore dump using sqlcmd
            docker exec -i shared_db /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'RootPass123!' -d shared_db -C -i /shared_db_dump.sql
          
          elif [ "${{ matrix.db_type }}" == "postgre" ]; then
            DUMP_FILE=".github/WORKFLOW_ARTIFACTS/DB_DUMPS/POSTGRESQL/shared_db_320_dump.sql"
            echo "Restoring PostgreSQL Shared dump from $DUMP_FILE..."
          
            # Copy SQL inside container
            docker cp "$DUMP_FILE" shared_db:/shared_db_dump.sql
          
            # Restore dump using psql
            docker exec -i -e PGPASSWORD=sharedpass shared_db psql -U shared_user -d shared_db -f /shared_db_dump.sql
          
          elif [ "${{ matrix.db_type }}" == "oracle" ]; then
            DUMP_FILE=".github/WORKFLOW_ARTIFACTS/DB_DUMPS/ORACLE/shared_db_dump_oracle_320.dmp"
            echo "Restoring Oracle Shared dump using Data Pump (impdp)..."
          
            # Create a directory for the dump inside the container
            docker exec -i shared_db bash -c "mkdir -p /tmp/dpdump"
          
            # Copy the dump file into the container
            docker cp "$DUMP_FILE" shared_db:/tmp/dpdump/shared_db_dump_oracle_320.dmp
          
            # Create Oracle directory inside the PDB, grant permissions, and run import
            docker exec -i shared_db bash -c "echo -e \"CREATE OR REPLACE DIRECTORY dp_dir AS '/tmp/dpdump';\nGRANT READ, WRITE ON DIRECTORY dp_dir TO SHARED_DB_USER;\nEXIT;\" | sqlplus -s sys/rootpass@//localhost:1521/XEPDB1 as sysdba && \
              impdp SHARED_DB_USER/sharedpass@//localhost:1521/XEPDB1 directory=dp_dir dumpfile=shared_db_dump_oracle_320.dmp logfile=shared_impdp.log full=y"
          fi
          
          echo "Shared DB dump restored successfully"

      - name: Run DB script on shared_db to add missing registry indices
        run: |
          if [ "${{ matrix.db_type }}" == "mysql" ]; then
            SCRIPT_FILE=".github/WORKFLOW_ARTIFACTS/DB_SCRIPTS/MySQL.sql"
            echo "Running MySQL script on shared_db container..."
          
            # Verify file exists
            test -f "$SCRIPT_FILE"
          
            # Copy and execute
            docker cp "$SCRIPT_FILE" shared_db:/shared_db_script.sql
            docker exec -i shared_db bash -c "cat /shared_db_script.sql | mysql -ushared_user -psharedpass WSO2AM_COMMON_DB"
          
          elif [ "${{ matrix.db_type }}" == "mssql" ]; then
            SCRIPT_FILE=".github/WORKFLOW_ARTIFACTS/DB_SCRIPTS/MSSQL.sql"
            echo "Running MSSQL script on shared_db container..."
          
            # Verify file exists
            test -f "$SCRIPT_FILE"
          
            # Copy and execute using sqlcmd
            docker cp "$SCRIPT_FILE" shared_db:/shared_db_script.sql
            docker exec -i shared_db /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'RootPass123!' -d shared_db -C -i /shared_db_script.sql
          
          elif [ "${{ matrix.db_type }}" == "postgre" ]; then
            SCRIPT_FILE=".github/WORKFLOW_ARTIFACTS/DB_SCRIPTS/PostgreSQL.sql"
            echo "Running PostgreSQL script on shared_db container..."
          
            # Verify file exists
            test -f "$SCRIPT_FILE"
          
            # Copy and execute using psql
            docker cp "$SCRIPT_FILE" shared_db:/shared_db_script.sql
            docker exec -i -e PGPASSWORD=sharedpass shared_db psql -U shared_user -d shared_db -f /shared_db_script.sql
          
          elif [ "${{ matrix.db_type }}" == "oracle" ]; then
            SCRIPT_FILE=".github/WORKFLOW_ARTIFACTS/DB_SCRIPTS/Oracle.sql"
            echo "Running Oracle script on shared_db container..."
          
            # Verify file exists
            test -f "$SCRIPT_FILE"
            
            # Copy and execute using sqlplus (Connecting to XEPDB1)
            docker cp "$SCRIPT_FILE" shared_db:/shared_db_script.sql
            docker exec -i shared_db bash -c "echo -e '@/shared_db_script.sql\nEXIT;' | sqlplus -s SHARED_DB_USER/sharedpass@//localhost:1521/XEPDB1"
          fi
          
          echo "DB script executed successfully"

      - name: Build Docker image for APIM
        env:
          APIM_SERVER_NAME: wso2am
        run: |
          set -e

          # Find the locally built APIM distribution zip
          DIST_PATH=$(find all-in-one-apim/modules/distribution/product/target \
            -maxdepth 1 -type f -name "wso2am-*-SNAPSHOT.zip" | head -n1)
          if [ -z "$DIST_PATH" ]; then
            echo "Distribution zip not found in all-in-one-apim/modules/distribution/product/target"
            exit 1
          fi

          echo "Using APIM distribution: $DIST_PATH"
          
          # Start a temporary HTTP server 
          DIST_DIR="all-in-one-apim/modules/distribution/product/target"
          cd "$DIST_DIR"
          python3 -m http.server 8000 --bind 127.0.0.1 &
          SERVER_PID=$!
          cd - >/dev/null
          
          trap "kill $SERVER_PID 2>/dev/null || true" EXIT
          
          sleep 3
          
          ZIP_NAME=$(basename "$DIST_PATH")
          
          # Build Docker image using official docker-apim Ubuntu Dockerfile
          docker build \
            --network=host \
            https://github.com/wso2/docker-apim.git#master:dockerfiles/ubuntu/apim \
            -t wso2am-migration:latest \
            --build-arg WSO2_SERVER="${APIM_SERVER_NAME}" \
            --build-arg WSO2_SERVER_DIST_URL="http://127.0.0.1:8000/${ZIP_NAME}"
          
          echo "Docker image built successfully"
          docker images | grep wso2am-migration || true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Download Migration Clients from S3
        run: |
          echo "=== Step 1: Fetching Migration Clients from S3 ==="
          mkdir -p .github/MIGRATION_RESOURCES
          
          # Find and download the latest APIM migration zip
          APIM_ZIP=$(aws s3 ls "s3://${{ secrets.S3_BUCKET_NAME }}/migration_clients/" | grep "wso2am-migration-" | awk '{print $4}' | sort -V | tail -n1)
          if [ -z "$APIM_ZIP" ]; then echo "APIM migration zip not found in S3"; exit 1; fi
          echo "Downloading $APIM_ZIP..."
          aws s3 cp "s3://${{ secrets.S3_BUCKET_NAME }}/migration_clients/$APIM_ZIP" .github/MIGRATION_RESOURCES/apim-migration.zip
          
          # Find and download the latest IS migration zip
          IS_ZIP=$(aws s3 ls "s3://${{ secrets.S3_BUCKET_NAME }}/migration_clients/" | grep "wso2is-migration-" | awk '{print $4}' | sort -V | tail -n1)
          if [ -z "$IS_ZIP" ]; then echo "IS migration zip not found in S3"; exit 1; fi
          echo "Downloading $IS_ZIP..."
          aws s3 cp "s3://${{ secrets.S3_BUCKET_NAME }}/migration_clients/$IS_ZIP" .github/MIGRATION_RESOURCES/identity-migration.zip


      - name: Identity Migration - Copy Resources and Run
        run: |
          echo "=== Step 2: Identity Migration Execution ==="
          
          # Extract the downloaded zip
          unzip -q .github/MIGRATION_RESOURCES/identity-migration.zip -d .github/MIGRATION_RESOURCES/identity-migration
          echo "Extracted Identity migration resources"

          # Verify the extracted structure locally
          echo "=== Verifying extracted migration zip structure ==="
          find .github/MIGRATION_RESOURCES/identity-migration -type f -name "migration-config.yaml" | head -5
          find .github/MIGRATION_RESOURCES/identity-migration -type d -name "migration-resources" | head -5
          find .github/MIGRATION_RESOURCES/identity-migration -name "org.wso2.carbon.is.migration-*.jar" | head -5
          
          # Find migration-resources folder and IS migration jar
          MIGRATION_RESOURCES=$(find .github/MIGRATION_RESOURCES/identity-migration -type d -name "migration-resources" | head -n1)
          if [ -z "$MIGRATION_RESOURCES" ]; then
            echo "Error: migration-resources folder not found"
            echo "Extracted structure:"
            ls -la .github/MIGRATION_RESOURCES/identity-migration/
            exit 1
          fi
          
          # Verify migration-config.yaml exists in the source
          if [ ! -f "$MIGRATION_RESOURCES/migration-config.yaml" ]; then
            echo "Error: migration-config.yaml not found in $MIGRATION_RESOURCES"
            echo "Contents of migration-resources:"
            ls -la "$MIGRATION_RESOURCES/"
            exit 1
          fi
          
          echo "✓ Found migration-resources at: $MIGRATION_RESOURCES"
          echo "✓ Found migration-config.yaml at: $MIGRATION_RESOURCES/migration-config.yaml"
          
          # Find IS migration jar
          IS_MIGRATION_JAR=$(find .github/MIGRATION_RESOURCES/identity-migration -name "org.wso2.carbon.is.migration-*.jar" | head -n1)
          if [ -z "$IS_MIGRATION_JAR" ]; then
            echo "Error: IS migration jar not found"
            find .github/MIGRATION_RESOURCES/identity-migration -type f -name "*.jar" | head -5
            exit 1
          fi
          
          echo "✓ Found IS migration jar at: $IS_MIGRATION_JAR"
          
          # Start container in detached mode
          CONTAINER_ID=$(docker run -d \
            --entrypoint "" \
            --name wso2am-identity-migration \
            --add-host=host.docker.internal:host-gateway \
            -e API_MANAGER_DATABASE_TYPE="$API_MANAGER_DATABASE_TYPE" \
            -e API_MANAGER_DATABASE_DRIVER="$API_MANAGER_DATABASE_DRIVER" \
            -e API_MANAGER_DATABASE_URL="$API_MANAGER_DATABASE_URL" \
            -e API_MANAGER_DATABASE_USERNAME="$API_MANAGER_DATABASE_USERNAME" \
            -e API_MANAGER_DATABASE_PASSWORD="$API_MANAGER_DATABASE_PASSWORD" \
            -e API_MANAGER_DATABASE_VALIDATION_QUERY="$API_MANAGER_DATABASE_VALIDATION_QUERY" \
            -e SHARED_DATABASE_TYPE="$SHARED_DATABASE_TYPE" \
            -e SHARED_DATABASE_DRIVER="$SHARED_DATABASE_DRIVER" \
            -e SHARED_DATABASE_URL="$SHARED_DATABASE_URL" \
            -e SHARED_DATABASE_USERNAME="$SHARED_DATABASE_USERNAME" \
            -e SHARED_DATABASE_PASSWORD="$SHARED_DATABASE_PASSWORD" \
            -e SHARED_DATABASE_VALIDATION_QUERY="$SHARED_DATABASE_VALIDATION_QUERY" \
            wso2am-migration:latest \
            sleep infinity)
          
          echo "Container started: $CONTAINER_ID"
          sleep 3
          
          echo "Copying migration-resources folder to container..."
          # Ensure target directory exists
          docker exec $CONTAINER_ID mkdir -p /home/wso2carbon/wso2am/migration-resources
          # Copy the entire migration-resources directory contents into APIM home
          docker cp "$MIGRATION_RESOURCES/." $CONTAINER_ID:/home/wso2carbon/wso2am/migration-resources/
          
          echo "Verifying migration-resources in container..."
          docker exec $CONTAINER_ID bash -c '
            echo "=== migration-resources contents ==="
            ls -la /home/wso2carbon/wso2am/migration-resources/ | head -20
            if [ ! -f /home/wso2carbon/wso2am/migration-resources/migration-config.yaml ]; then
              echo "✗ migration-config.yaml not found in /home/wso2carbon/wso2am/migration-resources"
              echo "Files in migration-resources:"
              ls -la /home/wso2carbon/wso2am/migration-resources/
              exit 1
            else
              echo "✓ migration-config.yaml found in /home/wso2carbon/wso2am/migration-resources"
            fi
          '
          
          echo "Copying IS migration jar to container..."
          docker exec $CONTAINER_ID mkdir -p /home/wso2carbon/wso2am/repository/components/dropins
          docker cp "$IS_MIGRATION_JAR" $CONTAINER_ID:/home/wso2carbon/wso2am/repository/components/dropins/
          
          echo "Starting Identity migration..."
          docker exec -d $CONTAINER_ID bash -c \
          "cd /home/wso2carbon/wso2am && bin/api-manager.sh -Dmigrate -Dcomponent=identity"
          
          echo ""
          echo "=== Waiting for logs to be created ==="
          
          # Wait up to 1 minute for the log file to appear
          timeout 60 bash -c '
          until docker exec '"$CONTAINER_ID"' test -f /home/wso2carbon/wso2am/repository/logs/wso2carbon.log; do
          sleep 2
          done
          ' || true
        
          echo ""
          echo "=== Streaming Identity Migration Logs ==="
          echo "----------------------------------------------------"
        
          # Stream full logs for exactly 6 minutes
          timeout 360 docker exec -i $CONTAINER_ID bash -c \
            "tail -F /home/wso2carbon/wso2am/repository/logs/wso2carbon.log" || true
          
          echo ""
          echo "=== Log streaming finished ==="
          
          echo ""
          echo "=== Final Logs (Last 500 lines) ==="
          docker exec $CONTAINER_ID bash -c \
            "tail -500 /home/wso2carbon/wso2am/repository/logs/wso2carbon.log 2>/dev/null || echo 'Log file not found'" || true
            
          echo ""
          echo "=== Stopping API Manager ==="
          docker exec $CONTAINER_ID pkill -f "api-manager.sh" || true
          sleep 5
          
          echo ""
          echo "=== Removing Identity Migration Resources ==="
          docker exec -u root $CONTAINER_ID bash -c "
          rm -rf /home/wso2carbon/wso2am/migration-resources || true
          rm -f /home/wso2carbon/wso2am/repository/components/dropins/org.wso2.carbon.is.migration-*.jar || true
          "
        
          echo ""
          echo "=== Stopping and Removing Container ==="
            docker stop $CONTAINER_ID
            docker rm $CONTAINER_ID
            
            echo ""
            echo "Identity migration run completed"

      - name: APIM Migration - Pre-Migration
        run: |
          echo "=== Step 3: APIM Pre-Migration ==="
          
          # Extract the downloaded zip
          unzip -q .github/MIGRATION_RESOURCES/apim-migration.zip -d .github/MIGRATION_RESOURCES/apim-migration
          
